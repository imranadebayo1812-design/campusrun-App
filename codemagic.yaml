workflows:
  supabase-deploy:
    name: Deploy Supabase Edge Functions
    max_build_duration: 10
    instance_type: linux_x2
    environment:
      groups:
        - supabase
      vars:
        SUPABASE_PROJECT_REF: xwnedkgpwhbmoxanhmth
    scripts:
      - name: Install Supabase CLI
        script: |
          curl -fsSL https://supabase.com/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          supabase --version

      - name: Deploy send-email function
        script: |
          export PATH="$HOME/.local/bin:$PATH"
          supabase functions deploy send-email \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --token "$SUPABASE_ACCESS_TOKEN"

      - name: Set RESEND_API_KEY secret
        script: |
          export PATH="$HOME/.local/bin:$PATH"
          supabase secrets set "RESEND_API_KEY=$RESEND_API_KEY" \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --token "$SUPABASE_ACCESS_TOKEN"

    publishing:
      email:
        recipients:
          - imranadebayo1812@gmail.com
        notify:
          success: true
          failure: true

  android-build:
    name: CampusRun Android
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      groups:
        - android
      vars:
        PACKAGE_NAME: com.campusrun.app
      node: "22"
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Restore keystore
        script: |
          mkdir -p android/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore/campusrun-release.keystore

      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - imranadebayo1812@gmail.com
        notify:
          success: true
          failure: true

  ios-build:
    name: CampusRun iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: com.campusrun.app
        XCODE_WORKSPACE: ios/App/App.xcodeproj/project.xcworkspace
        XCODE_SCHEME: App
      node: "22"
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          KEY_B64=$(printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" \
            | sed 's/-----[A-Z ]*-----//g' \
            | tr -d ' \n\r\t')
          printf -- "-----BEGIN PRIVATE KEY-----\n%s\n-----END PRIVATE KEY-----\n" \
            "$(printf '%s' "$KEY_B64" | fold -w 64)" > /tmp/api_key.p8
          unset APP_STORE_CONNECT_PRIVATE_KEY
          # Build and validate cert key — fall back to generating if stored key is wrong
          NEED_NEW_KEY=true
          if [ -n "$CERTIFICATE_PRIVATE_KEY" ]; then
            CERT_B64=$(printf '%s' "$CERTIFICATE_PRIVATE_KEY" \
              | sed 's/-----[A-Z ]*-----//g' \
              | tr -d ' \n\r\t')
            printf -- "-----BEGIN RSA PRIVATE KEY-----\n%s\n-----END RSA PRIVATE KEY-----\n" \
              "$(printf '%s' "$CERT_B64" | fold -w 64)" > /tmp/cert_key.pem
            if openssl rsa -check -in /tmp/cert_key.pem -noout 2>/dev/null; then
              NEED_NEW_KEY=false
            else
              echo "Stored CERTIFICATE_PRIVATE_KEY is not a valid RSA key — generating a new one"
            fi
          fi
          if [ "$NEED_NEW_KEY" = "true" ]; then
            openssl genrsa -out /tmp/cert_key.pem 2048
            cp /tmp/cert_key.pem ./certificate_private_key.pem
            echo "=== NEW CERTIFICATE KEY SAVED TO ARTIFACTS ==="
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --private-key @file:/tmp/api_key.p8 \
            --certificate-key @file:/tmp/cert_key.pem \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Lock portrait orientation
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"

      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

      - name: Upload to TestFlight
        script: |
          KEY_B64=$(printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" \
            | sed 's/-----[A-Z ]*-----//g' \
            | tr -d ' \n\r\t')
          printf -- "-----BEGIN PRIVATE KEY-----\n%s\n-----END PRIVATE KEY-----\n" \
            "$(printf '%s' "$KEY_B64" | fold -w 64)" > /tmp/api_key.p8
          unset APP_STORE_CONNECT_PRIVATE_KEY
          app-store-connect publish \
            --path "$(find build/ios/ipa -name '*.ipa' | head -1)" \
            --private-key @file:/tmp/api_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --testflight || true

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - certificate_private_key.pem

    publishing:
      email:
        recipients:
          - imranadebayo1812@gmail.com
        notify:
          success: true
          failure: true
